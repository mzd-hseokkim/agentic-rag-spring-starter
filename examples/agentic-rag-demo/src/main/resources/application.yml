server:
  port: 8080

spring:
  application:
    name: agentic-rag-demo
  # Ollama 응답 대기 여유. gpt-oss:20b 같은 대형 모델 콜드 스타트는 30초 훌쩍 넘김.
  http:
    client:
      connect-timeout: 30s
      read-timeout: 5m
  ai:
    ollama:
      base-url: http://localhost:11434
      embedding:
        options:
          model: qwen3-embedding:4b
          keep-alive: 30m
      chat:
        options:
          model: gpt-oss:20b
          temperature: 0.3
          keep-alive: 30m

agentic-rag:
  language: ko
  retrieval:
    overscan-factor: 3
  factcheck:
    enabled: true
    min-confidence: 0.5
  guardrails:
    pii-mask:         { enabled: true }
    prompt-injection: { enabled: true }
  # agents.enabled=true 로 바꾸면 6-agent 오케스트레이션 모드로 전환됨.
  agents:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    kr.co.mz.agenticai: INFO
